<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正念身体扫描 🧘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #2d3748;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2d3748;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 32px;
            font-size: 16px;
        }

        .duration-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .duration-btn {
            padding: 12px 24px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .duration-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .duration-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .timer-display {
            font-size: 80px;
            font-weight: 300;
            margin-bottom: 24px;
            color: #2d3748;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }

        .current-part {
            font-size: 24px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 32px;
            min-height: 36px;
        }

        .body-map-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
            gap: 40px;
            flex-wrap: wrap;
        }

        .body-svg {
            width: 180px;
            height: auto;
        }

        .body-part {
            fill: #e2e8f0;
            transition: all 0.5s ease;
        }

        .body-part.active {
            fill: #48bb78;
            filter: drop-shadow(0 0 8px rgba(72, 187, 120, 0.6));
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .start-btn {
            background: #48bb78;
            color: white;
        }

        .start-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .pause-btn {
            background: #ed8936;
            color: white;
        }

        .pause-btn:hover {
            background: #dd6b20;
            transform: translateY(-2px);
        }

        .reset-btn {
            background: #e53e3e;
            color: white;
        }

        .reset-btn:hover {
            background: #c53030;
            transform: translateY(-2px);
        }

        .guide-section {
            background: #f7fafc;
            border-radius: 12px;
            padding: 24px;
            text-align: left;
            line-height: 1.8;
            color: #4a5568;
        }

        .guide-section h3 {
            margin-bottom: 16px;
            color: #2d3748;
            text-align: center;
        }

        .guide-step {
            margin-bottom: 12px;
            padding-left: 24px;
            position: relative;
        }

        .guide-step::before {
            content: "•";
            color: #667eea;
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 32px 24px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .timer-display {
                font-size: 56px;
            }

            .current-part {
                font-size: 20px;
            }

            .body-svg {
                width: 140px;
            }
            
            .control-btn {
                padding: 14px 24px;
                font-size: 16px;
                min-width: 100px;
            }

            .body-map-container {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>正念身体扫描</h1>
        <p class="subtitle">慢下来，感受身体的每一处</p>

        <div class="duration-selector">
            <button class="duration-btn active" data-minutes="5">5分钟</button>
            <button class="duration-btn" data-minutes="10">10分钟</button>
            <button class="duration-btn" data-minutes="15">15分钟</button>
            <button class="duration-btn" data-minutes="20">20分钟</button>
            <button class="duration-btn" data-minutes="30">30分钟</button>
        </div>

        <div class="timer-display" id="timer">05:00</div>
        <div class="current-part" id="currentPart">准备开始</div>

        <div class="body-map-container">
            <!-- 正面身体图 -->
            <svg class="body-svg" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
                <!-- 头顶 -->
                <path class="body-part" id="part-head" d="M50 10 C65 10 75 25 75 40 C75 55 65 70 50 70 C35 70 25 55 25 40 C25 25 35 10 50 10 Z" />
                <!-- 脸部 -->
                <path class="body-part" id="part-face" d="M50 40 C62 40 70 52 70 65 C70 78 62 90 50 90 C38 90 30 78 30 65 C30 52 38 40 50 40 Z" />
                <!-- 脖子 -->
                <rect class="body-part" id="part-neck" x="45" y="90" width="10" height="15" rx="2" />
                <!-- 肩膀 -->
                <path class="body-part" id="part-shoulder" d="M20 105 L80 105 L85 115 L15 115 Z" />
                <!-- 胸部 -->
                <rect class="body-part" id="part-chest" x="30" y="105" width="40" height="30" rx="5" />
                <!-- 腹部 -->
                <rect class="body-part" id="part-abdomen" x="32" y="135" width="36" height="35" rx="5" />
                <!-- 臀部 -->
                <path class="body-part" id="part-hip" d="M30 170 L70 170 L75 185 L25 185 Z" />
                <!-- 左臂 -->
                <path class="body-part" id="part-left-arm" d="M20 105 L10 130 L15 150 L25 130 Z" />
                <!-- 右手掌 -->
                <circle class="body-part" id="part-left-hand" cx="12" cy="155" r="6" />
                <!-- 右臂 -->
                <path class="body-part" id="part-right-arm" d="M80 105 L90 130 L85 150 L75 130 Z" />
                <!-- 左手掌 -->
                <circle class="body-part" id="part-right-hand" cx="88" cy="155" r="6" />
                <!-- 左大腿 -->
                <rect class="body-part" id="part-left-thigh" x="28" y="180" width="18" height="40" rx="5" />
                <!-- 右大腿 -->
                <rect class="body-part" id="part-right-thigh" x="54" y="180" width="18" height="40" rx="5" />
                <!-- 左小腿 -->
                <rect class="body-part" id="part-left-calf" x="30" y="220" width="14" height="35" rx="3" />
                <!-- 右小腿 -->
                <rect class="body-part" id="part-right-calf" x="56" y="220" width="14" height="35" rx="3" />
                <!-- 左脚掌 -->
                <path class="body-part" id="part-left-foot" d="M30 255 L44 255 L44 265 L30 268 Z" />
                <!-- 右脚掌 -->
                <path class="body-part" id="part-right-foot" d="M56 255 L70 255 L70 268 L56 265 Z" />
                <!-- 左脚趾 -->
                <circle class="body-part" id="part-left-toe" cx="37" cy="268" r="4" />
                <!-- 右脚趾 -->
                <circle class="body-part" id="part-right-toe" cx="63" cy="268" r="4" />
            </svg>

            <!-- 背面身体图 -->
            <svg class="body-svg" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
                <!-- 背部 -->
                <rect class="body-part" id="part-back" x="30" y="105" width="40" height="65" rx="5" />
            </svg>
        </div>

        <div class="controls">
            <button class="control-btn start-btn" id="startBtn">开始</button>
            <button class="control-btn pause-btn" id="pauseBtn" style="display: none;">暂停</button>
            <button class="control-btn reset-btn" id="resetBtn">重置</button>
        </div>

        <div class="guide-section">
            <h3>身体扫描引导</h3>
            <div class="guide-step">找一个安静舒适的地方坐下或躺下，闭上眼睛</div>
            <div class="guide-step">跟着图示的高亮部位，慢慢感受每一个部位的感觉，不管是紧张还是放松</div>
            <div class="guide-step">如果注意力分散了，没关系，轻轻把它拉回来就好</div>
            <div class="guide-step">不用评判，只是单纯的观察和感受</div>
        </div>
    </div>

    <script>
        let timerInterval;
        let totalSeconds = 5 * 60;
        let isRunning = false;
        let currentPartIndex = 0;
        let partDuration = 0;

        // 扫描部位顺序
        const scanParts = [
            { id: 'part-left-toe', name: '左脚趾' },
            { id: 'part-right-toe', name: '右脚趾' },
            { id: 'part-left-foot', name: '左脚掌' },
            { id: 'part-right-foot', name: '右脚掌' },
            { id: 'part-left-calf', name: '左小腿' },
            { id: 'part-right-calf', name: '右小腿' },
            { id: 'part-left-thigh', name: '左大腿' },
            { id: 'part-right-thigh', name: '右大腿' },
            { id: 'part-hip', name: '臀部' },
            { id: 'part-abdomen', name: '腹部' },
            { id: 'part-chest', name: '胸部' },
            { id: 'part-back', name: '背部' },
            { id: 'part-shoulder', name: '肩膀' },
            { id: 'part-left-arm', name: '左手臂' },
            { id: 'part-left-hand', name: '左手掌' },
            { id: 'part-right-arm', name: '右手臂' },
            { id: 'part-right-hand', name: '右手掌' },
            { id: 'part-neck', name: '脖子' },
            { id: 'part-face', name: '脸部' },
            { id: 'part-head', name: '头顶' }
        ];

        const timerEl = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const durationBtns = document.querySelectorAll('.duration-btn');
        const currentPartEl = document.getElementById('currentPart');
        const endSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimer() {
            timerEl.textContent = formatTime(totalSeconds);
        }

        function updateCurrentPart() {
            // 清除所有高亮
            document.querySelectorAll('.body-part').forEach(p => p.classList.remove('active'));
            
            if (currentPartIndex < scanParts.length) {
                const part = scanParts[currentPartIndex];
                // 高亮当前部位
                document.getElementById(part.id)?.classList.add('active');
                // 更新提示文字
                currentPartEl.textContent = `请专注于：${part.name}`;
            } else {
                currentPartEl.textContent = '扫描完成，休息一会儿吧';
            }
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            
            // 计算每个部位的扫描时间
            partDuration = Math.ceil(totalSeconds / scanParts.length);
            
            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimer();
                
                // 切换部位
                const elapsed = (parseInt(document.querySelector('.duration-btn.active').dataset.minutes) * 60) - totalSeconds;
                const newPartIndex = Math.floor(elapsed / partDuration);
                
                if (newPartIndex !== currentPartIndex && newPartIndex < scanParts.length) {
                    currentPartIndex = newPartIndex;
                    updateCurrentPart();
                }
                
                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    endSound.play();
                    startBtn.style.display = 'inline-block';
                    pauseBtn.style.display = 'none';
                    currentPartEl.textContent = '🎉 时间到！身体扫描结束';
                    alert('时间到！身体扫描结束 ❤️');
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
            currentPartEl.textContent = '已暂停，点击开始继续';
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            currentPartIndex = 0;
            const activeBtn = document.querySelector('.duration-btn.active');
            totalSeconds = parseInt(activeBtn.dataset.minutes) * 60;
            updateTimer();
            currentPartEl.textContent = '准备开始';
            document.querySelectorAll('.body-part').forEach(p => p.classList.remove('active'));
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        durationBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isRunning) return;
                
                durationBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                totalSeconds = parseInt(btn.dataset.minutes) * 60;
                updateTimer();
                currentPartIndex = 0;
                currentPartEl.textContent = '准备开始';
                document.querySelectorAll('.body-part').forEach(p => p.classList.remove('active'));
            });
        });

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
    </script>
</body>
</html>
